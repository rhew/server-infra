---
- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - gnupg
      - systemd-timesyncd
      - unattended-upgrades
    state: present
    update_cache: true

- name: Keep SSH key-only
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-ansible-hardening.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PasswordAuthentication no
      PermitRootLogin no
      KbdInteractiveAuthentication no
    validate: sshd -t -f %s
  notify: reload ssh

- name: Enable time synchronization
  ansible.builtin.service:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Enable unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Enable automatic reboots after unattended security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52unattended-upgrades-local
    owner: root
    group: root
    mode: "0644"
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:30";

- name: Install Neovim support packages
  ansible.builtin.apt:
    name:
      - build-essential
      - fd-find
      - golang
      - nodejs
      - npm
      - ripgrep
      - unzip
    state: present
  tags:
    - nvim

- name: Create Neovim install directory
  ansible.builtin.file:
    path: "/opt/nvim-{{ neovim_version }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - nvim

- name: Install Neovim
  ansible.builtin.unarchive:
    src: "https://github.com/neovim/neovim/releases/download/{{ neovim_version }}/nvim-linux-x86_64.tar.gz"
    dest: "/opt/nvim-{{ neovim_version }}"
    extra_opts:
      - --strip-components=1
    remote_src: true
    owner: root
    group: root
    creates: "/opt/nvim-{{ neovim_version }}/bin/nvim"
  tags:
    - nvim

- name: Link vim
  ansible.builtin.file:
    src: "/opt/nvim-{{ neovim_version }}/bin/nvim"
    dest: /usr/local/bin/vim
    state: link
    owner: root
    group: root
  tags:
    - nvim

- name: Create Neovim config parent directory
  ansible.builtin.file:
    path: "/home/{{ server_user }}/.config"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  tags:
    - nvim

- name: Clone Neovim config
  ansible.builtin.git:
    repo: "{{ neovim_config_repo }}"
    dest: "/home/{{ server_user }}/.config/nvim"
    update: true
  become: false
  tags:
    - nvim
