---
- name: Clone service projects
  ansible.builtin.git:
    repo: "{{ item }}"
    dest: "/home/{{ server_user }}/{{ item | basename | regex_replace('\\.git$', '') }}"
    update: true
  become: false
  loop: "{{ project_repos }}"
  tags:
    - service_repos

- name: Install media filesystem packages
  ansible.builtin.apt:
    name: ntfs-3g
    state: present
  tags:
    - services
    - media_stack

- name: Create media mount point
  ansible.builtin.file:
    path: "{{ media_mount.path }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  tags:
    - services
    - media_stack

- name: Mount media drive
  ansible.builtin.mount:
    src: "{{ media_mount.src }}"
    path: "{{ media_mount.path }}"
    fstype: "{{ media_mount.fstype }}"
    opts: "{{ media_mount.opts }}"
    state: mounted
  register: media_mount_result
  tags:
    - services
    - media_stack

- name: Create media data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  loop: "{{ media_data_dirs }}"
  tags:
    - services
    - media_stack

- name: Create service data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  loop: "{{ service_data_dirs }}"
  tags:
    - services
    - media_stack

- name: Deploy media stack files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/media/{{ item.name }}"
    dest: "{{ media_stack_dir }}/{{ item.name }}"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "{{ item.mode }}"
  loop:
    - name: docker-compose.yml
      mode: "0644"
    - name: vpngate.py
      mode: "0755"
    - name: media-vpn-refresh
      mode: "0755"
  tags:
    - services
    - media_stack

- name: Configure media stack environment
  ansible.builtin.template:
    src: media-stack.env.j2
    dest: "{{ media_stack_dir }}/.env"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"
  tags:
    - services
    - media_stack

- name: Install media VPN refresh service
  ansible.builtin.template:
    src: media-vpn-refresh.service.j2
    dest: /etc/systemd/system/media-vpn-refresh.service
    owner: root
    group: root
    mode: "0644"
  tags:
    - services
    - media_stack

- name: Install media VPN refresh timer
  ansible.builtin.template:
    src: media-vpn-refresh.timer.j2
    dest: /etc/systemd/system/media-vpn-refresh.timer
    owner: root
    group: root
    mode: "0644"
  tags:
    - services
    - media_stack

- name: Enable media VPN refresh timer
  ansible.builtin.systemd:
    name: media-vpn-refresh.timer
    enabled: true
    state: started
    daemon_reload: true
  tags:
    - services
    - media_stack

- name: Configure led-pixel-wall weather client
  ansible.builtin.template:
    src: led-pixel-wall.env.j2
    dest: /home/rhew/led-pixel-wall/client-examples/.env
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"

- name: Configure agent-control-plane container identity
  ansible.builtin.template:
    src: agent-control-plane.env.j2
    dest: /home/rhew/agent-control-plane/.env
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0644"
  tags:
    - services
    - agent_control_plane

- name: Remove agent-control-plane compose override
  ansible.builtin.file:
    dest: /home/rhew/agent-control-plane/docker-compose.override.yml
    state: absent
  tags:
    - services
    - agent_control_plane

- name: Start Pi-hole
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /home/rhew/pi-hole
  become: false
  tags:
    - services
    - pihole

- name: Generate VPN Gate config
  ansible.builtin.command:
    cmd: python3 vpngate.py
    chdir: "{{ media_stack_dir }}"
    creates: "{{ media_stack_dir }}/gluetun/vpngate.ovpn"
  become: false
  tags:
    - services
    - media_stack

- name: Start media stack
  ansible.builtin.command:
    cmd: >-
      docker compose up -d
      {% if media_mount_result is defined and media_mount_result.changed %}--force-recreate{% endif %}
    chdir: "{{ media_stack_dir }}"
  become: false
  tags:
    - services
    - media_stack

- name: Check agent-control-plane secrets
  ansible.builtin.stat:
    path: /home/rhew/agent-control-plane/hermes-config/.env
  register: agent_control_plane_secrets
  tags:
    - services
    - agent_control_plane

- name: Start agent-control-plane
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /home/rhew/agent-control-plane
  become: false
  when: agent_control_plane_secrets.stat.exists
  tags:
    - services
    - agent_control_plane

- name: Build led-pixel-wall weather image
  ansible.builtin.command:
    cmd: docker build -t led-wall-weather .
    chdir: /home/rhew/led-pixel-wall
  become: false
  tags:
    - services
    - led_wall

- name: Remove existing led-wall-weather container
  ansible.builtin.command:
    cmd: docker rm -f led-wall-weather
  become: false
  register: led_wall_remove
  changed_when: led_wall_remove.rc == 0
  failed_when: led_wall_remove.rc not in [0, 1]
  tags:
    - services
    - led_wall

- name: Start led-wall-weather
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name led-wall-weather
      --network host
      --restart unless-stopped
      --env-file /home/rhew/led-pixel-wall/client-examples/.env
      led-wall-weather
  become: false
  tags:
    - services
    - led_wall
