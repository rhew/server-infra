---
- name: Clone service projects
  ansible.builtin.git:
    repo: "{{ item }}"
    dest: "/home/{{ server_user }}/{{ item | basename | regex_replace('\\.git$', '') }}"
    update: true
  become: false
  loop: "{{ project_repos }}"
  tags:
    - service_repos

- name: Install media filesystem packages
  ansible.builtin.apt:
    name: ntfs-3g
    state: present
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Create media mount point
  ansible.builtin.file:
    path: "{{ media_mount.path }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Mount media drive
  ansible.builtin.mount:
    src: "{{ media_mount.src }}"
    path: "{{ media_mount.path }}"
    fstype: "{{ media_mount.fstype }}"
    opts: "{{ media_mount.opts }}"
    state: mounted
  register: media_mount_result
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Create media data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  loop: "{{ media_data_dirs }}"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Create service data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  loop: "{{ service_data_dirs }}"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Deploy private-torrent-downloader files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../private-torrent-downloader/{{ item.src }}"
    dest: "{{ private_torrent_downloader_dir }}/{{ item.dest }}"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "{{ item.mode }}"
  loop:
    - name: docker-compose.yml
      src: docker-compose.yml
      dest: docker-compose.yml
      mode: "0644"
    - name: Dockerfile.curator
      src: Dockerfile.curator
      dest: Dockerfile.curator
      mode: "0644"
    - name: requirements.txt
      src: requirements.txt
      dest: requirements.txt
      mode: "0644"
    - name: transmission-settings.json
      src: transmission-settings.json
      dest: transmission-settings.json
      mode: "0644"
    - name: vpngate.py
      src: vpngate.py
      dest: vpngate.py
      mode: "0755"
    - name: vpn-refresh
      src: vpn-refresh
      dest: vpn-refresh
      mode: "0755"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Deploy curator source tree
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../private-torrent-downloader/curator/"
    dest: "{{ private_torrent_downloader_dir }}/curator/"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: preserve
    directory_mode: "0755"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Configure private-torrent-downloader environment
  ansible.builtin.template:
    src: private-torrent-downloader.env.j2
    dest: "{{ private_torrent_downloader_dir }}/.env"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Configure curator server
  ansible.builtin.template:
    src: curator-server.toml.j2
    dest: "{{ private_torrent_downloader_dir }}/curator/server.toml"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Install private-torrent-downloader VPN refresh service
  ansible.builtin.template:
    src: private-torrent-downloader-vpn-refresh.service.j2
    dest: /etc/systemd/system/private-torrent-downloader-vpn-refresh.service
    owner: root
    group: root
    mode: "0644"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Install private-torrent-downloader VPN refresh timer
  ansible.builtin.template:
    src: private-torrent-downloader-vpn-refresh.timer.j2
    dest: /etc/systemd/system/private-torrent-downloader-vpn-refresh.timer
    owner: root
    group: root
    mode: "0644"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Enable private-torrent-downloader VPN refresh timer
  ansible.builtin.systemd:
    name: private-torrent-downloader-vpn-refresh.timer
    enabled: true
    state: started
    daemon_reload: true
  when: not ansible_check_mode
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Stop old media VPN refresh timer
  ansible.builtin.systemd:
    name: media-vpn-refresh.timer
    enabled: false
    state: stopped
  register: old_media_vpn_timer
  failed_when:
    - old_media_vpn_timer.failed
    - "'Could not find' not in (old_media_vpn_timer.msg | default(''))"
    - "'not found' not in (old_media_vpn_timer.msg | default(''))"
  when: not ansible_check_mode
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Remove old media VPN refresh units
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/media-vpn-refresh.service
    - /etc/systemd/system/media-vpn-refresh.timer
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Configure led-pixel-wall weather client
  ansible.builtin.template:
    src: led-pixel-wall.env.j2
    dest: /home/rhew/led-pixel-wall/client-examples/.env
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"

- name: Configure agent-control-plane container identity
  ansible.builtin.template:
    src: agent-control-plane.env.j2
    dest: /home/rhew/agent-control-plane/.env
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0644"
  tags:
    - services
    - agent_control_plane

- name: Remove agent-control-plane compose override
  ansible.builtin.file:
    dest: /home/rhew/agent-control-plane/docker-compose.override.yml
    state: absent
  tags:
    - services
    - agent_control_plane

- name: Start Pi-hole
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /home/rhew/pi-hole
  become: false
  tags:
    - services
    - pihole

- name: Generate VPN Gate config
  ansible.builtin.command:
    cmd: python3 vpngate.py
    chdir: "{{ private_torrent_downloader_dir }}"
    creates: "{{ private_torrent_downloader_dir }}/gluetun/vpngate.ovpn"
  become: false
  when: not ansible_check_mode
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Start private-torrent-downloader stack
  ansible.builtin.command:
    cmd: >-
      docker compose up -d
      --build
      --remove-orphans
      {% if media_mount_result is defined and media_mount_result.changed %}--force-recreate{% endif %}
    chdir: "{{ private_torrent_downloader_dir }}"
  become: false
  when: not ansible_check_mode
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Check agent-control-plane secrets
  ansible.builtin.stat:
    path: /home/rhew/agent-control-plane/hermes-config/.env
  register: agent_control_plane_secrets
  tags:
    - services
    - agent_control_plane

- name: Start agent-control-plane
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /home/rhew/agent-control-plane
  become: false
  when: agent_control_plane_secrets.stat.exists
  tags:
    - services
    - agent_control_plane

- name: Build led-pixel-wall weather image
  ansible.builtin.command:
    cmd: docker build -t led-wall-weather .
    chdir: /home/rhew/led-pixel-wall
  become: false
  tags:
    - services
    - led_wall

- name: Remove existing led-wall-weather container
  ansible.builtin.command:
    cmd: docker rm -f led-wall-weather
  become: false
  register: led_wall_remove
  changed_when: led_wall_remove.rc == 0
  failed_when: led_wall_remove.rc not in [0, 1]
  tags:
    - services
    - led_wall

- name: Start led-wall-weather
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name led-wall-weather
      --network host
      --restart unless-stopped
      --env-file /home/rhew/led-pixel-wall/client-examples/.env
      led-wall-weather
  become: false
  tags:
    - services
    - led_wall
