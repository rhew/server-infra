---
- name: Clone service projects
  ansible.builtin.git:
    repo: "{{ item }}"
    dest: "/home/{{ server_user }}/{{ item | basename | regex_replace('\\.git$', '') }}"
    update: true
  become: false
  loop: "{{ project_repos }}"
  tags:
    - service_repos

- name: Install media filesystem packages
  ansible.builtin.apt:
    name: ntfs-3g
    state: present
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Create media mount point
  ansible.builtin.file:
    path: "{{ media_mount.path }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Mount media drive
  ansible.builtin.mount:
    src: "{{ media_mount.src }}"
    path: "{{ media_mount.path }}"
    fstype: "{{ media_mount.fstype }}"
    opts: "{{ media_mount.opts }}"
    state: mounted
  register: media_mount_result
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Create media data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  loop: "{{ media_data_dirs }}"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Create service data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  loop: "{{ service_data_dirs }}"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Create Transmission config directory
  ansible.builtin.file:
    path: "{{ private_torrent_downloader_transmission_config_dir }}"
    state: directory
    owner: "{{ private_torrent_downloader_app_uid }}"
    group: "{{ private_torrent_downloader_app_gid }}"
    mode: "0750"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Deploy private-torrent-downloader from GitHub
  ansible.builtin.shell: |
    set -eu
    initialized=false
    before_head="$(git rev-parse HEAD 2>/dev/null || true)"
    before_dirty=""
    if [ -d .git ]; then
      before_dirty="$(git status --porcelain --untracked-files=no)"
    fi
    if [ ! -d .git ]; then
      git init
      initialized=true
    fi
    git remote remove origin >/dev/null 2>&1 || true
    git remote add origin "{{ private_torrent_downloader_repo }}"
    git fetch origin "{{ private_torrent_downloader_version }}"
    git checkout -B "{{ private_torrent_downloader_version }}"
    git reset --hard "origin/{{ private_torrent_downloader_version }}"
    after_head="$(git rev-parse HEAD)"
    if [ "$initialized" = true ] || [ "$before_head" != "$after_head" ] || [ -n "$before_dirty" ]; then
      echo "updated private-torrent-downloader to $after_head"
    fi
  args:
    chdir: "{{ private_torrent_downloader_dir }}"
    executable: /bin/bash
  become: false
  register: private_torrent_downloader_git_deploy
  changed_when: "'updated private-torrent-downloader' in private_torrent_downloader_git_deploy.stdout"
  tags:
    - service_repos
    - services
    - media_stack
    - private_torrent_downloader

- name: Remove unmanaged curator artifacts
  ansible.builtin.file:
    path: "{{ private_torrent_downloader_dir }}/{{ item }}"
    state: absent
  loop:
    - curator/__pycache__
    - curator/app.py
    - curator/client.example.toml
    - curator/client.toml
    - curator/curator
    - curator/curator.toml
    - curator/library
    - curator/remote.py
    - curator/server.example.toml
    - curator/server.toml
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Configure private-torrent-downloader environment
  ansible.builtin.template:
    src: private-torrent-downloader.env.j2
    dest: "{{ private_torrent_downloader_dir }}/.env"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Check local curator config
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../host_vars/{{ inventory_hostname }}.curator.toml"
  delegate_to: localhost
  become: false
  register: private_torrent_downloader_curator_config
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Configure curator server from local config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../host_vars/{{ inventory_hostname }}.curator.toml"
    dest: "{{ private_torrent_downloader_dir }}/curator-config/curator.toml"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"
  when: private_torrent_downloader_curator_config.stat.exists
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Configure curator server from template
  ansible.builtin.template:
    src: curator.toml.j2
    dest: "{{ private_torrent_downloader_dir }}/curator-config/curator.toml"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"
  when: not private_torrent_downloader_curator_config.stat.exists
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Install private-torrent-downloader VPN refresh service
  ansible.builtin.template:
    src: private-torrent-downloader-vpn-refresh.service.j2
    dest: /etc/systemd/system/private-torrent-downloader-vpn-refresh.service
    owner: root
    group: root
    mode: "0644"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Install private-torrent-downloader VPN refresh timer
  ansible.builtin.template:
    src: private-torrent-downloader-vpn-refresh.timer.j2
    dest: /etc/systemd/system/private-torrent-downloader-vpn-refresh.timer
    owner: root
    group: root
    mode: "0644"
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Enable private-torrent-downloader VPN refresh timer
  ansible.builtin.systemd:
    name: private-torrent-downloader-vpn-refresh.timer
    enabled: true
    state: started
    daemon_reload: true
  when: not ansible_check_mode
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Stop old media VPN refresh timer
  ansible.builtin.systemd:
    name: media-vpn-refresh.timer
    enabled: false
    state: stopped
  register: old_media_vpn_timer
  failed_when:
    - old_media_vpn_timer.failed
    - "'Could not find' not in (old_media_vpn_timer.msg | default(''))"
    - "'not found' not in (old_media_vpn_timer.msg | default(''))"
  when: not ansible_check_mode
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Remove old media VPN refresh units
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/media-vpn-refresh.service
    - /etc/systemd/system/media-vpn-refresh.timer
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Configure led-pixel-wall weather client
  ansible.builtin.template:
    src: led-pixel-wall.env.j2
    dest: /home/rhew/led-pixel-wall/client-examples/.env
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"
  tags:
    - services
    - led_wall

- name: Configure agent-control-plane container identity
  ansible.builtin.template:
    src: agent-control-plane.env.j2
    dest: /home/rhew/agent-control-plane/.env
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0644"
  tags:
    - services
    - agent_control_plane

- name: Remove agent-control-plane compose override
  ansible.builtin.file:
    dest: /home/rhew/agent-control-plane/docker-compose.override.yml
    state: absent
  tags:
    - services
    - agent_control_plane

- name: Start Pi-hole
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /home/rhew/pi-hole
  become: false
  tags:
    - services
    - pihole

- name: Generate VPN Gate config
  ansible.builtin.command:
    cmd: python3 vpngate.py
    chdir: "{{ private_torrent_downloader_dir }}"
    creates: "{{ private_torrent_downloader_dir }}/gluetun/vpngate.ovpn"
  become: false
  when: not ansible_check_mode
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Start private-torrent-downloader stack
  ansible.builtin.command:
    cmd: >-
      docker compose up -d
      --build
      --remove-orphans
      {% if media_mount_result is defined and media_mount_result.changed %}--force-recreate{% endif %}
    chdir: "{{ private_torrent_downloader_dir }}"
  become: false
  when: not ansible_check_mode
  tags:
    - services
    - media_stack
    - private_torrent_downloader

- name: Check agent-control-plane secrets
  ansible.builtin.stat:
    path: /home/rhew/agent-control-plane/hermes-config/.env
  register: agent_control_plane_secrets
  tags:
    - services
    - agent_control_plane

- name: Start agent-control-plane
  community.docker.docker_compose_v2:
    project_src: /home/rhew/agent-control-plane
    state: present
  become: false
  when:
    - agent_control_plane_enabled | bool
    - agent_control_plane_secrets.stat.exists
  tags:
    - services
    - agent_control_plane

- name: Undeploy agent-control-plane
  community.docker.docker_compose_v2:
    project_src: /home/rhew/agent-control-plane
    state: absent
    remove_volumes: false
  become: false
  when: not (agent_control_plane_enabled | bool)
  tags:
    - services
    - agent_control_plane

- name: Build led-pixel-wall weather image
  ansible.builtin.command:
    cmd: docker build -t led-wall-weather .
    chdir: /home/rhew/led-pixel-wall
  become: false
  tags:
    - services
    - led_wall

- name: Remove existing led-wall-weather container
  ansible.builtin.command:
    cmd: docker rm -f led-wall-weather
  become: false
  register: led_wall_remove
  changed_when: led_wall_remove.rc == 0
  failed_when: led_wall_remove.rc not in [0, 1]
  tags:
    - services
    - led_wall

- name: Start led-wall-weather
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name led-wall-weather
      --network host
      --restart unless-stopped
      --env-file /home/rhew/led-pixel-wall/client-examples/.env
      led-wall-weather
  become: false
  tags:
    - services
    - led_wall
