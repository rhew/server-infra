---
project_repos:
  - https://github.com/rhew/pi-hole.git
  - https://github.com/rhew/led-pixel-wall.git
  - https://github.com/rhew/agent-control-plane.git

private_torrent_downloader_repo: https://github.com/rhew/private-torrent-downloader.git
private_torrent_downloader_version: main
private_torrent_downloader_dir: /opt/private-torrent-downloader
private_torrent_downloader_app_uid: 1000
private_torrent_downloader_app_gid: 1000
private_torrent_downloader_tz: America/New_York
private_torrent_downloader_curator_port: 8787
private_torrent_downloader_transmission_image: lscr.io/linuxserver/transmission
private_torrent_downloader_transmission_config_dir: /opt/private-torrent-downloader/transmission-config
private_torrent_downloader_vpngate_country: ""
private_torrent_downloader_vpngate_min_speed: 5000000
private_torrent_downloader_vpngate_max_ping: 300
private_torrent_downloader_vpngate_min_uptime: 86400
private_torrent_downloader_video_gid: 44
private_torrent_downloader_render_gid: 992

media_vpn_refresh_calendar: daily
media_vpn_refresh_randomized_delay: 1h

media_mount:
  src: UUID=178D4DC92A913325
  path: /home/rhew/media
  fstype: ntfs-3g
  opts: uid=1000,gid=1000,dmask=0022,fmask=0133,nofail,x-systemd.automount

# Required common parent of the sibling downloads/ and library/ directories.
media_root: /home/rhew/media

media_data_dirs:
  - "{{ media_root }}/downloads/complete"
  - "{{ media_root }}/downloads/incomplete"
  - "{{ media_root }}/library"
  - "{{ media_root }}/library/audiobooks"
  - "{{ media_root }}/library/books"
  - "{{ media_root }}/library/movies"
  - "{{ media_root }}/library/shows"

service_data_dirs:
  - /home/rhew/pi-hole/etc-pihole
  - /home/rhew/pi-hole/etc-dnsmasq.d
  - "{{ private_torrent_downloader_dir }}"
  - "{{ private_torrent_downloader_dir }}/curator"
  - "{{ private_torrent_downloader_dir }}/curator-config"
  - "{{ private_torrent_downloader_dir }}/data/jellyfin/config"
  - "{{ private_torrent_downloader_dir }}/data/jellyfin/cache"
  - "{{ private_torrent_downloader_dir }}/gluetun"
  - "{{ private_torrent_downloader_dir }}/jackett-config"
  - /home/rhew/agent-control-plane/hermes-config
