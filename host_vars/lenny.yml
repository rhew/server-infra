---
project_repos:
  - https://github.com/rhew/pi-hole.git
  - https://github.com/rhew/led-pixel-wall.git
  - https://github.com/rhew/agent-control-plane.git

media_stack_dir: /opt/media-stack
media_stack_puid: 1000
media_stack_pgid: 1000
media_stack_tz: America/New_York
media_stack_qbittorrent_webui_port: 8080
media_stack_prowlarr_port: 9696
media_stack_radarr_port: 7878
media_stack_vpngate_country: ""
media_stack_vpngate_min_speed: 5000000
media_stack_vpngate_max_ping: 300
media_stack_vpngate_min_uptime: 86400
media_stack_video_gid: 44
media_stack_render_gid: 992

media_vpn_refresh_calendar: daily
media_vpn_refresh_randomized_delay: 1h

media_mount:
  src: UUID=178D4DC92A913325
  path: /home/rhew/media
  fstype: ntfs-3g
  opts: uid=1000,gid=1000,dmask=0022,fmask=0133,nofail,x-systemd.automount

media_data_dirs:
  - /home/rhew/media/downloads/complete
  - /home/rhew/media/downloads/incomplete
  - /home/rhew/media/library/movies

service_data_dirs:
  - /home/rhew/pi-hole/etc-pihole
  - /home/rhew/pi-hole/etc-dnsmasq.d
  - "{{ media_stack_dir }}"
  - "{{ media_stack_dir }}/data/qbittorrent/config"
  - "{{ media_stack_dir }}/data/prowlarr/config"
  - "{{ media_stack_dir }}/data/radarr/config"
  - "{{ media_stack_dir }}/data/jellyfin/config"
  - "{{ media_stack_dir }}/data/jellyfin/cache"
  - "{{ media_stack_dir }}/gluetun"
  - /home/rhew/agent-control-plane/hermes-config
